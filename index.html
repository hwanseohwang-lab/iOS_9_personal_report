<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Team Sparta – Personal Report</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── 라이트모드 시스템 컬러 ─── */
    :root {
      --label:     #000000;
      --label2:    rgba(60, 60, 67, 0.60);
      --label3:    rgba(60, 60, 67, 0.30);
      --sep:       rgba(60, 60, 67, 0.18);
      --blue:      #007AFF;
      --red:       #FF3B30;
      --fill:      rgba(120, 120, 128, 0.12);
    }

    html, body {
      width: 100%; min-height: 100%;
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: #EDE8DF;
      color: var(--label);
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       iOS 26 스타일 벽지 (라이트, 선명한 색상)
       유리를 통해 이 색이 굴절되어 보임
    ══════════════════════════════════════ */
    .wallpaper {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 12% 18%,  rgba(255, 130,  60, 0.82) 0%, transparent 55%),
        radial-gradient(ellipse 55% 50% at 88%  8%,  rgba( 80, 160, 255, 0.78) 0%, transparent 52%),
        radial-gradient(ellipse 70% 55% at 50% 95%,  rgba(100, 210, 185, 0.72) 0%, transparent 58%),
        radial-gradient(ellipse 55% 48% at 88% 78%,  rgba(185, 110, 255, 0.68) 0%, transparent 52%),
        radial-gradient(ellipse 48% 55% at 18% 82%,  rgba(255, 190,  80, 0.62) 0%, transparent 52%),
        radial-gradient(ellipse 60% 40% at 50% 45%,  rgba(255, 220, 180, 0.40) 0%, transparent 55%),
        #EDE8DF;
    }

    /* ══════════════════════════════════════
       iOS 상태바
    ══════════════════════════════════════ */
    .status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 54px;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 28px 10px;
      color: #1C1C1E;
    }
    .sb-time {
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    }
    .sb-right { display: flex; align-items: center; gap: 7px; }

    /* ══════════════════════════════════════
       메인 스크린
    ══════════════════════════════════════ */
    .screen {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 62px 20px 0;
    }

    /* ══════════════════════════════════════
       앱 아이콘 + 헤더
    ══════════════════════════════════════ */
    .app-header {
      text-align: center;
      margin: 28px 0 28px;
      width: 100%;
    }

    /* iOS 앱 아이콘 — Liquid Glass 버전 (투명도 대폭 낮춤) */
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 21.54%;
      margin: 0 auto 16px;
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;

      /* 훨씬 더 투명한 Liquid Glass — 벽지 색이 강하게 비침 */
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(32px) saturate(280%) brightness(1.12);
      -webkit-backdrop-filter: blur(32px) saturate(280%) brightness(1.12);

      border: 1px solid rgba(255, 255, 255, 0.75);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-bottom-color: rgba(255, 255, 255, 0.30);

      box-shadow:
        0 6px 36px rgba(0, 0, 0, 0.16),
        0 1px  4px rgba(0, 0, 0, 0.10),
        inset 0  1px 0 rgba(255, 255, 255, 0.90),
        inset 0 -1px 0 rgba(255, 255, 255, 0.15);
    }

    /* 렌즈 굴절 — 좌상단 강하게 */
    .app-icon::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        140deg,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.12) 25%,
        rgba(255,255,255,0.00) 50%,
        rgba(255,255,255,0.08) 100%
      );
      z-index: 2; pointer-events: none;
    }

    .app-icon-logo { position: relative; z-index: 3; width: 62%; height: 62%; }

    .app-name {
      font-size: 13px; color: var(--label2); font-weight: 400;
      margin-bottom: 14px; letter-spacing: 0;
    }

    /* iOS Large Title */
    .large-title {
      font-size: 34px; font-weight: 700;
      letter-spacing: 0.37px; line-height: 1.12;
      color: #1C1C1E; margin-bottom: 6px;
    }

    .header-sub {
      font-size: 15px; color: var(--label2);
      line-height: 1.5; font-weight: 400;
    }

    /* ══════════════════════════════════════
       Liquid Glass Card (핵심!)
    ══════════════════════════════════════ */
    .glass-card {
      width: 100%;
      position: relative; overflow: hidden;
      border-radius: 20px;

      /* ① 유리 재질 */
      background: rgba(255, 255, 255, 0.52);
      backdrop-filter: blur(48px) saturate(200%) brightness(1.04);
      -webkit-backdrop-filter: blur(48px) saturate(200%) brightness(1.04);

      /* ② 스펙큘러 테두리 — 위쪽/왼쪽이 더 밝음 (빛이 위에서 옴) */
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-top-color:  rgba(255, 255, 255, 1.00);
      border-left-color: rgba(255, 255, 255, 0.90);
      border-bottom-color: rgba(255, 255, 255, 0.42);

      /* ③ 그림자 + 내부 하이라이트 */
      box-shadow:
        0 2px 48px rgba(0, 0, 0, 0.10),
        0 1px  3px rgba(0, 0, 0, 0.06),
        inset 0  1px 0 rgba(255, 255, 255, 0.90),
        inset 0 -1px 0 rgba(255, 255, 255, 0.18);

      margin-bottom: 10px;
    }

    /* ④ 렌즈 굴절 오버레이 (Liquid Glass 특유의 엣지 굴절) */
    .glass-card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; z-index: 1;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.36) 0%,
        rgba(255, 255, 255, 0.08) 28%,
        rgba(255, 255, 255, 0.00) 52%,
        rgba(255, 255, 255, 0.00) 75%,
        rgba(255, 255, 255, 0.10) 100%
      );
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       iOS 설정 앱 스타일 폼 셀
    ══════════════════════════════════════ */
    .form-cell {
      display: flex; align-items: center;
      min-height: 50px; padding: 0 18px; gap: 14px;
      position: relative; z-index: 2;
    }

    /* iOS 정확한 구분선 — 0.33px */
    .form-cell + .form-cell::before {
      content: '';
      position: absolute; top: 0; left: 18px; right: 0;
      height: 0.33px;
      background: var(--sep);
    }

    .cell-label {
      font-size: 17px; font-weight: 400; color: #1C1C1E;
      width: 90px; flex-shrink: 0; pointer-events: none;
    }

    .cell-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: inherit; font-size: 17px; font-weight: 400;
      color: #1C1C1E; text-align: right;
      padding: 13px 0; caret-color: var(--blue);
    }
    .cell-input::placeholder { color: var(--label3); }
    .cell-input:-webkit-autofill,
    .cell-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 100px rgba(255,255,255,0) inset;
      -webkit-text-fill-color: #1C1C1E;
    }

    /* ══════════════════════════════════════
       섹션 푸터 텍스트
    ══════════════════════════════════════ */
    .section-footer {
      font-size: 13px; color: var(--label2);
      padding: 8px 18px 0; line-height: 1.45;
      margin-bottom: 24px;
    }

    /* ══════════════════════════════════════
       Liquid Glass 버튼 — 파란 틴트
    ══════════════════════════════════════ */
    .glass-btn {
      width: 100%; height: 52px; position: relative; overflow: hidden;
      border-radius: 16px; border: none; cursor: pointer;
      font-family: inherit; font-size: 17px; font-weight: 600;
      color: white; letter-spacing: -0.2px;
      display: flex; align-items: center; justify-content: center; gap: 6px;

      background: rgba(0, 122, 255, 0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);

      border: 1px solid rgba(255, 255, 255, 0.42);
      border-top-color: rgba(255, 255, 255, 0.72);

      box-shadow:
        0 2px 24px rgba(0, 122, 255, 0.38),
        0 1px  4px rgba(0, 122, 255, 0.20),
        inset 0  1px 0 rgba(255, 255, 255, 0.42);

      transition: opacity 0.12s;
    }

    /* 버튼 shimmer */
    .glass-btn::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.00) 55%
      );
      pointer-events: none;
    }

    .glass-btn:active { opacity: 0.72; transform: scale(0.99); }
    .glass-btn.loading { opacity: 0.65; pointer-events: none; }
    .glass-btn.loading .btn-text { display: none; }
    .glass-btn.loading .spinner { display: block; }

    .spinner {
      display: none; width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.38);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.72s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       에러 — Glass 버전
    ══════════════════════════════════════ */
    .error-glass {
      display: none; width: 100%; margin-bottom: 12px;
      border-radius: 14px; padding: 14px 16px;
      display: none; gap: 12px; align-items: flex-start;

      background: rgba(255, 59, 48, 0.10);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 59, 48, 0.28);
      border-top-color: rgba(255, 59, 48, 0.50);
    }
    .error-glass.show { display: flex; }

    .err-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--red); color: white;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .err-body { font-size: 15px; color: #C0392B; line-height: 1.4; }
    .err-body small { display: block; font-size: 13px; color: rgba(192,57,43,0.68); margin-top: 2px; }

    /* ══════════════════════════════════════
       데모 안내 — Glass
    ══════════════════════════════════════ */
    .demo-glass {
      width: 100%; margin-bottom: 14px;
      border-radius: 14px; padding: 12px 16px;
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; line-height: 1.5;

      background: rgba(0, 122, 255, 0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(0, 122, 255, 0.22);
      border-top-color: rgba(0, 122, 255, 0.40);
      color: rgba(0, 90, 210, 0.88);
    }

    /* ══════════════════════════════════════
       홈 인디케이터
    ══════════════════════════════════════ */
    .spacer { flex: 1; min-height: 32px; }

    .home-indicator {
      display: flex; justify-content: center;
      padding: 10px 0 36px;
    }
    .home-bar {
      width: 134px; height: 5px; border-radius: 3px;
      background: rgba(60, 60, 67, 0.26);
    }

    /* ══════════════════════════════════════
       진입 애니메이션 — iOS spring
    ══════════════════════════════════════ */
    .a1, .a2, .a3, .a4, .a5 {
      animation: iosIn 0.52s cubic-bezier(0.26, 0.60, 0.36, 1.00) both;
    }
    .a2 { animation-delay: 0.06s; }
    .a3 { animation-delay: 0.11s; }
    .a4 { animation-delay: 0.15s; }
    .a5 { animation-delay: 0.19s; }

    @keyframes iosIn {
      from { opacity: 0; transform: translateY(22px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1.00); }
    }
  </style>
</head>

  };

  /* ── 폼 제출 ── */
  document.getElementById('lookupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name  = document.getElementById('inputName').value.trim();
    const birth = document.getElementById('inputBirth').value.trim();
    const phone = document.getElementById('inputPhone').value.trim();
    const btn   = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorBox');

    btn.classList.add('loading');
    errBox.classList.remove('show');

    try {
      const data = sb ? await fetchSupabase(name, birth, phone)
                      : await fakeDelay(900, DEMO);
      sessionStorage.setItem('reportData', JSON.stringify(data));
      window.location.href = 'report.html';
    } catch {
      errBox.classList.add('show');
    } finally {
      btn.classList.remove('loading');
    }
  });

  async function fetchSupabase(name, birth, phone) {
    const { data: rows, error } = await sb.from('students').select('*')
      .eq('name', name).eq('birthdate', birth).like('phone', `%${phone}`);
    if (error || !rows?.length) throw new Error('not found');
    const s = rows[0];
    const [{ data:att }, { data:projs }, { data:lets }, { data:sts }, { data:awds }] = await Promise.all([
      sb.from('attendance').select('*').eq('student_id', s.id).single(),
      sb.from('projects').select('*').eq('student_id', s.id).order('sort_order'),
      sb.from('letters').select('*').eq('student_id', s.id).order('sort_order'),
      sb.from('stats').select('*').eq('student_id', s.id).single(),
      sb.from('awards').select('*').eq('student_id', s.id).order('sort_order'),
    ]);
    return {
      student:{ id:s.id, name:s.name, cohort:s.cohort, startDate:s.start_date, endDate:s.end_date, track:s.track||'iOS 앱 개발자 양성과정', profileMessage:s.profile_message||'' },
      attendance: att?{ totalDays:att.total_days, attendedDays:att.attended_days, absentDays:att.absent_days, trainingHours:att.training_hours, rate:att.rate }:null,
      projects:(projs||[]).map(p=>({ name:p.name, description:p.description, role:p.role, techStack:p.tech_stack, period:p.period, githubUrl:p.github_url, dashboardUrl:p.dashboard_url, appStoreUrl:p.app_store_url, demoVideoUrl:p.demo_video_url, teamSize:p.team_size, award:p.award, thumbnailUrl:p.thumbnail_url, projectType:p.project_type||'기초' })),
      letters:(lets||[]).map(l=>({ type:l.type, from:l.from_name, title:l.title, content:l.content })),
      stats:sts?{ assignmentTotal:sts.assignment_total, assignmentCompleted:sts.assignment_completed, assignmentRate:sts.assignment_rate, grade:sts.grade, specialAchievement:sts.special_achievement, totalCommits:sts.total_commits, tilCount:sts.til_count, tilOutstanding:sts.til_outstanding, zepPoints:sts.zep_points, zepHours:sts.zep_hours, zepChats:sts.zep_chats, chapterAchievement:sts.chapter_achievement, chapterAssignment:sts.chapter_assignment }:null,
      awards:(awds||[]).map(a=>({ name:a.name, description:a.description, imageUrl:a.image_url })),
    };
  }

  const fakeDelay = (ms, val) => new Promise(r => setTimeout(() => r(val), ms));

  ['inputBirth','inputPhone'].forEach(id =>
    document.getElementById(id).addEventListener('input', e =>
      e.target.value = e.target.value.replace(/\D/g, ''))
  );
</script>
</body>
</html>
